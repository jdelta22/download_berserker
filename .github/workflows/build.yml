name: Build executables

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers (Linux)
        if: runner.os == 'Linux'
        run: playwright install chromium --with-deps

      - name: Install Playwright browsers (Windows/macOS)
        if: runner.os != 'Linux'
        run: playwright install chromium

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "MangaDownloader" --collect-data customtkinter --collect-all playwright --add-data "assets;assets" app.py

      - name: Build (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "MangaDownloader" --collect-data customtkinter --collect-all playwright --add-data "assets:assets" app.py

      # Package each OS's output into one clearly-named file so it's ready
      # to attach directly to a release (macOS produces a .app bundle/folder,
      # which needs zipping; Windows/Linux are already a single file).
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p release
          cp dist/MangaDownloader.exe release/MangaDownloader-Windows.exe

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          cd dist
          if [ -d "MangaDownloader.app" ]; then
            zip -r "../release/MangaDownloader-macOS.zip" "MangaDownloader.app"
          else
            zip -j "../release/MangaDownloader-macOS.zip" "MangaDownloader"
          fi

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          cp dist/MangaDownloader release/MangaDownloader-Linux
          chmod +x release/MangaDownloader-Linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MangaDownloader-${{ matrix.os }}
          path: release/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded

      - name: Flatten downloaded files
        run: |
          mkdir -p release-files
          find downloaded -type f -exec cp {} release-files/ \;

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true